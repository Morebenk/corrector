<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consensus Dashboard</title>
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* General Styles */
      body {
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #eef2f6, #f9fafc);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        text-align: center;
        font-size: 2.5rem;
        color: #1a2b49;
        margin-bottom: 40px;
        font-weight: 700;
      }

      /* Controls Section */
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
      }
      .controls label {
        display: flex;
        flex-direction: column;
        font-size: 0.95rem;
        font-weight: 600;
        color: #344767;
      }
      select,
      input[type="text"],
      textarea {
        padding: 12px;
        font-size: 1rem;
        margin-top: 8px;
        border: 1px solid #d1d9e6;
        border-radius: 8px;
        background: #fafbff;
        transition: border-color 0.3s, box-shadow 0.3s;
        width: 100%;
        box-sizing: border-box;
      }
      select:focus,
      input[type="text"]:focus,
      textarea:focus {
        border-color: #4c6fff;
        box-shadow: 0 0 8px rgba(76, 111, 255, 0.3);
        outline: none;
      }

      /* Buttons */
      button {
        padding: 12px 20px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: linear-gradient(90deg, #4c6fff, #738cff);
        color: #fff;
        box-shadow: 0 3px 8px rgba(76, 111, 255, 0.2);
        transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(76, 111, 255, 0.3);
        background: linear-gradient(90deg, #3b5ce6, #627bff);
      }
      .form-button {
        background: linear-gradient(90deg, #2ecc71, #54d98c);
      }
      .form-button:hover {
        background: linear-gradient(90deg, #27ae60, #46c77e);
      }
      .form-button.cancel {
        background: linear-gradient(90deg, #ff4757, #ff6b81);
      }
      .form-button.cancel:hover {
        background: linear-gradient(90deg, #e63e4d, #f55c72);
      }
      .remove-choice {
        background: #ff4757;
        padding: 5px 10px;
        font-size: 0.9rem;
      }
      .generate-explanation {
        background: linear-gradient(90deg, #9b59b6, #8e44ad);
        margin-top: 10px;
      }
      .generate-explanation:hover {
        background: linear-gradient(90deg, #8e44ad, #9b59b6);
      }

      /* Question Details */
      .question-details {
        padding-top: 30px;
        border-top: 1px solid #e6ecf2;
      }
      .section-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #1a2b49;
        background: #f8fafc;
        padding: 15px 20px;
        border-radius: 8px;
        margin: 25px 0 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }
      .section-title:hover {
        background: #eef2f6;
      }
      .section-content {
        padding: 0 20px;
        overflow: hidden;
        transition: max-height 0.4s ease, opacity 0.3s ease;
        max-height: 1000px;
        opacity: 1;
      }
      .section-content.collapsed {
        max-height: 0;
        opacity: 0;
      }

      /* Predictions and Consensus */
      .predictions-container {
        background: #f9fbfd;
        padding: 20px;
        border-radius: 8px;
        margin-top: 10px;
      }
      .prediction {
        margin: 10px 0;
        font-size: 1rem;
        color: #344767;
      }
      .full-consensus {
        color: #2ecc71;
        font-weight: bold;
      }
      .majority-agreement {
        color: #f1c40f;
      }
      .no-agreement {
        color: #ff4757;
      }

      /* Edit Form */
      .edit-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .form-field {
        margin-bottom: 30px;
      }
      .choice-container {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }
      .choice-container input[type="radio"] {
        margin: 0;
      }
      .choice-container input[type="text"] {
        flex: 1;
        min-width: 0;
      }
      .choice-container button {
        padding: 5px 10px;
        font-size: 0.9rem;
      }

      /* Utility */
      .loading {
        text-align: center;
        color: #7a869a;
        font-style: italic;
      }
      ul {
        padding-left: 25px;
      }
      li {
        margin: 10px 0;
        font-size: 1rem;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }
        .controls {
          grid-template-columns: 1fr;
        }
        .choice-container {
          flex-wrap: wrap;
          gap: 5px;
        }
        .choice-container input[type="text"] {
          flex-basis: 100%;
          margin-top: 5px;
        }
        .choice-container button {
          margin-top: 5px;
        }
      }
      @media (max-width: 480px) {
        .edit-header {
          flex-direction: column;
          align-items: flex-start;
        }
        .edit-header h2 {
          margin-bottom: 20px;
        }
        .edit-header .form-button {
          display: block;
          width: 100%;
          margin-bottom: 15px;
        }
        button {
          padding: 10px 15px;
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Consensus Dashboard</h1>
      <div class="controls">
        <label>
          Status:
          <select id="statusDropdown">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Category:
          <select id="categoryDropdown">
            <option value="all">All</option>
          </select>
        </label>
        <label>
          Search Question:
          <input type="text" id="searchInput" placeholder="Type to search..." />
        </label>
        <label>
          Question:
          <select id="questionDropdown"></select>
        </label>
      </div>
      <div class="question-details" id="output">
        <p class="loading">Loading...</p>
      </div>
    </div>

    <script>
      let questionsData = [];
      let uniqueCategories = [];
      const categoryColors = [
        "#4c6fff",
        "#6f42c1",
        "#20c997",
        "#8c510a",
        "#e83e8c",
        "#6c757d",
        "#17a2b8",
        "#6610f2",
      ];
      let categoryColorMap = {};

      async function fetchQuestions() {
        try {
          document.getElementById("output").innerHTML =
            "<p class='loading'>Loading questions...</p>";
          const response = await fetch("/api/questions");
          questionsData = await response.json();
          uniqueCategories = [...new Set(questionsData.map((q) => q.category))];
          categoryColorMap = {};
          uniqueCategories.forEach((cat, index) => {
            categoryColorMap[cat] =
              categoryColors[index % categoryColors.length];
          });
          populateFilters();
          populateQuestions();
        } catch (err) {
          console.error("Error fetching questions:", err);
          document.getElementById("output").innerHTML =
            "<p>Error loading questions.</p>";
        }
      }

      function populateFilters() {
        const statusSet = new Set(questionsData.map((q) => q.status));
        const statusDropdown = document.getElementById("statusDropdown");
        statusSet.forEach((status) => {
          const option = document.createElement("option");
          option.value = status;
          option.textContent = status;
          statusDropdown.appendChild(option);
        });

        const categoryDropdown = document.getElementById("categoryDropdown");
        uniqueCategories.forEach((category) => {
          const option = document.createElement("option");
          option.value = category;
          option.textContent = category;
          categoryDropdown.appendChild(option);
        });
      }

      function populateQuestions() {
        const statusFilter = document.getElementById("statusDropdown").value;
        const categoryFilter =
          document.getElementById("categoryDropdown").value;
        const searchQuery = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const questionDropdown = document.getElementById("questionDropdown");

        questionDropdown.innerHTML = "";

        const filtered = questionsData.filter((q) => {
          const matchesStatus =
            statusFilter === "all" || q.status === statusFilter;
          const matchesCategory =
            categoryFilter === "all" || q.category === categoryFilter;
          const matchesSearch = q.enhanced_text
            .toLowerCase()
            .includes(searchQuery);
          return matchesStatus && matchesCategory && matchesSearch;
        });

        filtered.forEach((q) => {
          const option = document.createElement("option");
          const consensusRatio = `${q.matching_models}/${q.models_count}`;
          const agreement =
            q.models_count > 0 ? (q.matching_models / q.models_count) * 100 : 0;
          let statusIcon = "❌";
          if (agreement === 100) statusIcon = "✅";
          else if (agreement > 50) statusIcon = "⚠️";
          option.value = q.id;
          option.textContent = `${
            q.id
          } - ${statusIcon} ${consensusRatio} agree - ${q.enhanced_text.substring(
            0,
            50
          )}...`;
          questionDropdown.appendChild(option);
        });

        if (filtered.length > 0) {
          questionDropdown.value = filtered[0].id;
          displayQuestionDetails(filtered[0].id);
        } else {
          document.getElementById("output").innerHTML =
            "<p>No questions match the selected filters.</p>";
        }
      }

      async function displayQuestionDetails(questionId) {
        try {
          document.getElementById("output").innerHTML =
            "<p class='loading'>Loading details...</p>";
          const response = await fetch(`/api/question/${questionId}`);
          const q = await response.json();
          if (q.error) {
            document.getElementById("output").innerHTML = `<p>${q.error}</p>`;
            return;
          }

          const container = document.getElementById("output");
          container.innerHTML = "";

          const headerDiv = document.createElement("div");
          headerDiv.classList.add("edit-header");
          headerDiv.style.display = "flex";
          headerDiv.style.justifyContent = "space-between";
          headerDiv.style.alignItems = "center";
          const title = document.createElement("h2");
          title.textContent = `Question ${q.id}`;
          headerDiv.appendChild(title);
          const editButton = document.createElement("button");
          editButton.textContent = "Edit";
          editButton.addEventListener("click", () => renderEditForm(q));
          headerDiv.appendChild(editButton);
          container.appendChild(headerDiv);

          const detailsDiv = document.createElement("div");
          const statusColor = {
            verified: "#2ecc71",
            likely_correct: "#f1c40f",
            incorrect: "#ff4757",
            needs_review: "#fd7e14",
          };
          const catColor = categoryColorMap[q.category] || "#344767";

          let html = `<p><strong>Status:</strong> <span style="color: ${
            statusColor[q.status] || "#344767"
          }">${
            q.status
          }</span> | <strong>Category:</strong> <span style="color: ${catColor}">${
            q.category
          }</span></p>`;
          html += `<p>${q.enhanced_text}</p>`;
          html += `<div class="section-title">Choices:</div>`;
          html += `<ul>`;
          const correctIndex = q.is_correct.findIndex((val) => val === "1");
          q.choices.forEach((choice, i) => {
            html +=
              i === correctIndex
                ? `<li style="background: #e6ffe6; padding: 8px; border-radius: 5px;">✓ ${choice}</li>`
                : `<li>${choice}</li>`;
          });
          html += `</ul>`;

          html += `<div class="section-title" data-toggle="explanation">Explanation: <span>▼</span></div>`;
          html += `<div class="section-content" id="explanationSection">${
            q.explanation || "No explanation provided."
          }</div>`;

          html += `<div class="section-title" data-toggle="predictions">Model Predictions: <span>▼</span></div>`;
          html += `<div class="section-content" id="predictionsSection"><div class="predictions-container">`;
          q.verification_results.forEach((pred) => {
            const expectedChoice =
              pred.expected_index >= 0 && pred.expected_index < q.choices.length
                ? q.choices[pred.expected_index]
                : "[unknown]";
            if (pred.error) {
              html += `<p class="prediction">❌ ${
                pred.model_name
              }: Error - ${pred.error.substring(0, 50)}...</p>`;
            } else if (pred.matches_expected) {
              const selectedChoice = q.choices[pred.selected_index];
              html += `<p class="prediction">✅ ${pred.model_name}: <span style="color: #4c6fff; font-weight: bold">${selectedChoice}</span></p>`;
            } else if (
              pred.selected_index >= 0 &&
              pred.selected_index < q.choices.length
            ) {
              const selectedChoice = q.choices[pred.selected_index];
              html += `<p class="prediction">❌ ${pred.model_name}: <span style="color: #4c6fff; font-weight: bold">${selectedChoice}</span> (Expected: ${expectedChoice})</p>`;
            } else if (pred.selected_index === -1) {
              const suggestion = pred.suggested_answer
                ? ` - Suggested: ${pred.suggested_answer}`
                : "";
              html += `<p class="prediction">❓ ${pred.model_name}: None correct${suggestion} (Expected: ${expectedChoice})</p>`;
            } else if (pred.selected_index === -2) {
              const suggestion = pred.suggested_answer
                ? `: "${pred.suggested_answer}"`
                : "";
              html += `<p class="prediction">❓ ${pred.model_name}: No clear selection${suggestion} (Expected: ${expectedChoice})</p>`;
            } else {
              html += `<p class="prediction">❌ ${pred.model_name}: Invalid selection (Expected: ${expectedChoice})</p>`;
            }
          });
          html += `</div></div>`;

          const agreementCount = q.verification_results.filter(
            (p) => p.matches_expected
          ).length;
          let consensus =
            agreementCount === q.models_count
              ? "Full Consensus ✅"
              : agreementCount > q.models_count / 2
              ? `Majority Agreement ⚠️ (${agreementCount}/${q.models_count})`
              : agreementCount === 0
              ? "No Agreement ❌"
              : `Minority Agreement ❌ (${agreementCount}/${q.models_count})`;
          let consensusClass = "";
          if (agreementCount === q.models_count)
            consensusClass = "full-consensus";
          else if (agreementCount > q.models_count / 2)
            consensusClass = "majority-agreement";
          else consensusClass = "no-agreement";
          html += `<div class="section-title">Consensus:</div><p class="${consensusClass}">${consensus}</p>`;

          detailsDiv.innerHTML = html;
          container.appendChild(detailsDiv);

          document
            .querySelectorAll(".section-title[data-toggle]")
            .forEach((title) => {
              title.addEventListener("click", () => {
                const section = document.getElementById(
                  `${title.dataset.toggle}Section`
                );
                section.classList.toggle("collapsed");
                title.querySelector("span").textContent =
                  section.classList.contains("collapsed") ? "▼" : "▲";
              });
            });
        } catch (err) {
          console.error("Error fetching details:", err);
          document.getElementById("output").innerHTML =
            "<p>Error loading details.</p>";
        }
      }

      function renderEditForm(q) {
        const container = document.getElementById("output");
        container.innerHTML = "";

        const form = document.createElement("form");
        form.id = "editForm";

        const headerDiv = document.createElement("div");
        headerDiv.classList.add("edit-header");
        const title = document.createElement("h2");
        title.textContent = `Editing Question ${q.id}`;
        headerDiv.appendChild(title);
        const btnDiv = document.createElement("div");
        const saveButton = document.createElement("button");
        saveButton.type = "button";
        saveButton.textContent = "Save";
        saveButton.classList.add("form-button");
        saveButton.style.marginRight = "15px";
        saveButton.addEventListener("click", () => saveEdits(q.id));
        const cancelButton = document.createElement("button");
        cancelButton.type = "button";
        cancelButton.textContent = "Cancel";
        cancelButton.classList.add("form-button", "cancel");
        cancelButton.addEventListener("click", () =>
          displayQuestionDetails(q.id)
        );
        btnDiv.appendChild(saveButton);
        btnDiv.appendChild(cancelButton);
        headerDiv.appendChild(btnDiv);
        form.appendChild(headerDiv);

        const textDiv = document.createElement("div");
        textDiv.classList.add("form-field");
        textDiv.innerHTML = `<label><strong>Question Text:</strong></label>`;
        const textArea = document.createElement("textarea");
        textArea.name = "enhanced_text";
        textArea.style.height = "150px";
        textArea.value = q.enhanced_text;
        textDiv.appendChild(textArea);
        form.appendChild(textDiv);

        const categoryDiv = document.createElement("div");
        categoryDiv.classList.add("form-field");
        categoryDiv.innerHTML = `<label><strong>Category:</strong></label>`;
        const categorySelect = document.createElement("select");
        categorySelect.name = "category";
        uniqueCategories.forEach((cat) => {
          const option = document.createElement("option");
          option.value = cat;
          option.textContent = cat;
          if (cat === q.category) option.selected = true;
          categorySelect.appendChild(option);
        });
        categoryDiv.appendChild(categorySelect);
        form.appendChild(categoryDiv);

        const choicesDiv = document.createElement("div");
        choicesDiv.classList.add("form-field");
        choicesDiv.innerHTML = `<label><strong>Choices:</strong></label>`;
        const choicesList = document.createElement("div");
        const correctIndex = q.is_correct.findIndex((val) => val === "1");
        q.choices.forEach((choice, i) => {
          const choiceContainer = document.createElement("div");
          choiceContainer.classList.add("choice-container");
          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = "correct_choice";
          radio.value = i;
          if (i === correctIndex) radio.checked = true;
          choiceContainer.appendChild(radio);
          const choiceInput = document.createElement("input");
          choiceInput.type = "text";
          choiceInput.name = `choice_${i}`;
          choiceInput.value = choice;
          choiceContainer.appendChild(choiceInput);
          const removeButton = document.createElement("button");
          removeButton.type = "button";
          removeButton.innerHTML = '<i class="fas fa-trash"></i>';
          removeButton.classList.add("remove-choice");
          removeButton.addEventListener("click", () => {
            choicesList.removeChild(choiceContainer);
            updateChoiceRadioValues(choicesList);
          });
          choiceContainer.appendChild(removeButton);
          choicesList.appendChild(choiceContainer);
        });

        const addChoiceButton = document.createElement("button");
        addChoiceButton.type = "button";
        addChoiceButton.textContent = "Add Choice";
        addChoiceButton.addEventListener("click", () => {
          const i = choicesList.children.length;
          const choiceContainer = document.createElement("div");
          choiceContainer.classList.add("choice-container");
          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = "correct_choice";
          radio.value = i;
          choiceContainer.appendChild(radio);
          const choiceInput = document.createElement("input");
          choiceInput.type = "text";
          choiceInput.name = `choice_${i}`;
          choiceInput.value = "";
          choiceContainer.appendChild(choiceInput);
          const removeButton = document.createElement("button");
          removeButton.type = "button";
          removeButton.innerHTML = '<i class="fas fa-trash"></i>';
          removeButton.classList.add("remove-choice");
          removeButton.addEventListener("click", () => {
            choicesList.removeChild(choiceContainer);
            updateChoiceRadioValues(choicesList);
          });
          choiceContainer.appendChild(removeButton);
          choicesList.appendChild(choiceContainer);
        });
        choicesDiv.appendChild(choicesList);
        choicesDiv.appendChild(addChoiceButton);
        form.appendChild(choicesDiv);

        const explanationDiv = document.createElement("div");
        explanationDiv.classList.add("form-field");
        explanationDiv.innerHTML = `<label><strong>Explanation:</strong></label>`;
        const explanationArea = document.createElement("textarea");
        explanationArea.name = "explanation";
        explanationArea.style.height = "150px";
        explanationArea.value = q.explanation || "";
        explanationDiv.appendChild(explanationArea);

        // Generate Explanation Button
        const generateButton = document.createElement("button");
        generateButton.type = "button";
        generateButton.innerHTML =
          '<i class="fas fa-magic"></i> Generate Explanation';
        generateButton.classList.add("generate-explanation");
        generateButton.addEventListener("click", async () => {
          const questionText = form.querySelector(
            'textarea[name="enhanced_text"]'
          ).value;
          const choiceInputs = form.querySelectorAll('input[name^="choice_"]');
          const choices = Array.from(choiceInputs).map((input) =>
            input.value.trim()
          );
          const correctChoice = form.querySelector(
            'input[name="correct_choice"]:checked'
          );
          if (!correctChoice) {
            alert(
              "Please select a correct choice before generating an explanation."
            );
            return;
          }
          const correctIndex = parseInt(correctChoice.value);

          try {
            const response = await fetch("/api/generate_explanation", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                question_text: questionText,
                choices: choices,
                correct_index: correctIndex,
              }),
            });
            const result = await response.json();
            if (result.status === "success") {
              explanationArea.value = result.explanation;
            } else {
              alert("Failed to generate explanation: " + result.error);
            }
          } catch (err) {
            console.error("Error:", err);
            alert("Error generating explanation.");
          }
        });
        explanationDiv.appendChild(generateButton);
        form.appendChild(explanationDiv);

        container.appendChild(form);
      }

      function updateChoiceRadioValues(choicesList) {
        Array.from(choicesList.children).forEach((container, i) => {
          const radio = container.querySelector('input[type="radio"]');
          radio.value = i;
          const choiceInput = container.querySelector('input[type="text"]');
          choiceInput.name = `choice_${i}`;
        });
      }

      async function saveEdits(questionId) {
        const form = document.getElementById("editForm");
        const formData = new FormData(form);
        const enhancedText = formData.get("enhanced_text");
        const category = formData.get("category");
        const explanation = formData.get("explanation");

        const choicesList = form.querySelectorAll('input[name^="choice_"]');
        if (choicesList.length === 0) {
          alert("Please add at least one choice.");
          return;
        }
        const correctChoice = form.querySelector(
          'input[name="correct_choice"]:checked'
        );
        if (!correctChoice) {
          alert("Please select a correct choice.");
          return;
        }
        const correctIndex = parseInt(correctChoice.value);
        const choices = Array.from(choicesList).map((input, i) => ({
          text: input.value.trim(),
          is_correct: i === correctIndex ? 1 : 0,
        }));

        if (choices.some((choice) => !choice.text)) {
          alert("All choices must have text.");
          return;
        }

        const data = {
          enhanced_text: enhancedText,
          category,
          explanation,
          choices,
        };

        try {
          const response = await fetch(`/api/question/${questionId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          const result = await response.json();
          if (result.status === "success") {
            alert("Update successful!");
            await fetchQuestions();
            displayQuestionDetails(questionId);
          } else {
            alert("Update failed: " + (result.error || "Unknown error"));
          }
        } catch (err) {
          console.error("Error updating question:", err);
          alert("Error updating question.");
        }
      }

      document
        .getElementById("statusDropdown")
        .addEventListener("change", populateQuestions);
      document
        .getElementById("categoryDropdown")
        .addEventListener("change", populateQuestions);
      document
        .getElementById("searchInput")
        .addEventListener("input", populateQuestions);
      document
        .getElementById("questionDropdown")
        .addEventListener("change", (e) =>
          displayQuestionDetails(e.target.value)
        );

      fetchQuestions();
    </script>
  </body>
</html>
